<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de compras</title>
</head>
<body>
    <header>
        <h1>Appwise Store</h1>
        <button>Carrito(2)</button>
    </header>

    <main>
        <section id="productos">
            <h2>Nuestros productos</h2>
            <div>
                <img src="./assets/auricular_gamer.webp" alt="" width="100">
                <h3>Auricular Gamer</h3>
                <p>$29.99</p>    
                <button>Añadir al carrito</button>
            </div>
            <div>
                <img src="./assets/teclado_mecanico.webp" alt="" width="100">
                <h3>Teclado Mecanico</h3>
                <p>$79.99</p>    
                <button>Añadir al carrito</button>
            </div>
            <div>
                <img src="./assets/mouse_gamer.webp" alt="" width="100">
                <h3>Mouse Gamer</h3>
                <p>$39.99</p>    
                <button>Añadir al carrito</button>
            </div>
        </section>
        <aside>
            <h2>Resumen del carrito</h2>
            <ul>
                <li>
                    <h3>Teclado Mecanico</h3>
                    <p>$79.99</p>    
                    <button>❌</button>
                </li>
                <li>
                    <h3>Mouse Gamer</h3>
                    <p>$39.99</p>    
                    <button>❌</button>
                </li>
            </ul>
            <hr>
            <h3>Total: $99.98</h3>
            <button>Finalizar compra</button>
        </aside>
    </main>
    
</body>
</html>
