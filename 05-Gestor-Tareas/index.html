<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>
</head>
<body>
    <main>
        <h1>Mis Tareas Pendientes</h1>

        <div>
            <input type="text" placeholder="Nueva tarea pendiente...">
            <button>Agregar Tarea</button>

            <ul>
                <li>
                    <input type="checkbox" checked>Hacer TPS
                    <button>❌</button>
                </li>
                <li>
                    <input type="checkbox">Regar las plantas
                    <button>❌</button>
                </li>
                <li>
                    <input type="checkbox">Estudiar ingles
                    <button>❌</button>
                </li>
            </ul>
            <p>Tienes 2 tareas pendientes</p>
            <button>Limpiar Completadas</button>
        </div>
        
    </main>
</body>
</html>
