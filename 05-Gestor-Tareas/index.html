<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&family=Cinzel:wght@400..900&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Oswald:wght@200..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <h1>Mis Tareas Pendientes</h1>

        <div class="container">
            <div class="nueva-tarea">
                <input type="text" placeholder="Nueva tarea pendiente...">
                <button id="btn-agregarTarea">Agregar Tarea</button>
            </div>

            <ul>
                <li>
                    <label>
                        <input type="checkbox" checked>
                        Hacer TPS
                    </label>
                    <button>❌</button>
                </li>
                <li>
                    <label>
                        <input type="checkbox" >
                        Regar las plantas
                    </label>
                    <button>❌</button>
                </li>
                <li>
                    <label>
                        <input type="checkbox" >
                        Hacer la cama
                    </label>
                    <button>❌</button>
                </li>
            </ul>
            <hr>
            <div class="footer-container">
                <p>Tienes 2 tareas pendientes</p>
                <button id="btn-limpiar">Limpiar Completadas</button>
            </div>
        </div>
        
    </main>
</body>
</html>
