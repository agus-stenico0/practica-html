<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unete a Appwise</title>
</head>
<body>
    <h1>Únete a la Comunidad Appwise</h1>

    <form action="#">
        <label for="nombre-completo">Nombre Completo</label>
        <input type="text" id="nombre-completo" required placeholder="Ej: Marcos Diaz">

        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="miemail@gmail.com">

        <label for="contraseña">Contraseña</label>
        <input type="password" id="contraseña">

        <label for="fecha">Fecha de Nacimiento</label>
        <input type="date" id="fecha">

        <label for="nivel-exp">Nivel en Programación</label>
        <select id="nivel-exp" name="nivel-exp">
            <option value="trainee">Trainee</option>
            <option value="junior">Junior</option>
            <option value="semi-senior">Semi-Senior</option>
        </select>

        <h3>¿Cual es tu especialidad?</h3>

        <label for="frontend">Frontend</label>
        <input type="radio" name="especialidad" id="frontend" value="frontend">
        <label for="backend">Backend</label>
        <input type="radio" name="especialidad" id="backend" value="backend">

        <label for="terminos-condiciones">Acepto los terminos y condiciones</label>
        <input type="checkbox" id="terminos-condiciones" required>

        <button type="submit">Crear Cuenta</button>
    </form>
</body>
</html>
