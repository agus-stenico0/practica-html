<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unete a Appwise</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&family=Cinzel:wght@400..900&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Oswald:wght@200..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Únete a la Comunidad Appwise</h1>

    <form action="#">
        <label for="nombre-completo">Nombre Completo</label>
        <input type="text" id="nombre-completo" required placeholder="Ej: Marcos Diaz">

        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="miemail@gmail.com">

        <label for="contraseña">Contraseña</label>
        <input type="password" id="contraseña" >

        <label for="fecha">Fecha de Nacimiento</label>
        <input type="date" id="fecha">

        <label for="nivel-exp">Nivel en Programación</label>
        <select id="nivel-exp" name="nivel-exp">
            <option value="trainee">Trainee</option>
            <option value="junior">Junior</option>
            <option value="semi-senior">Semi-Senior</option>
            <option value="senior">Senior</option>
        </select>

        <h3>¿Cual es tu especialidad?</h3>
        <div class="especialidad">
            <input type="radio" name="especialidad" id="frontend" value="frontend">           
            <label for="frontend">Frontend</label>
        </div>
        <div class="especialidad">
            <input type="radio" name="especialidad" id="backend" value="backend">
            <label for="backend">Backend</label>
        </div>
        <br>
        <div class="terminos-condiciones">
            <input type="checkbox" id="terminos-condiciones" required>
            <label for="terminos-condiciones">Acepto los terminos y condiciones</label>
        </div>
        <div id="button">
            <button type="submit">Crear Cuenta</button>
        </div>
    </form>
</body>
</html>
